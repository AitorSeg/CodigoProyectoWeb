<!DOCTYPE html>
<!-- Página de Contacto - Formulario para enviar consultas y dudas -->
<html lang="es">
<head>
    <!-- Configuración de caracteres y viewport para responsividad -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título de la página -->
    <title>GTI - Contacto</title>

    <!-- Estilos globales de GTI -->
    <link rel="stylesheet" href="../css/gti.css" />
    <!-- Estilos específicos para la página de contacto -->
    <link rel="stylesheet" href="../css/contacto.css" />
</head>
<body>

    <!-- Contenido principal de la página de contacto -->
    <main class="contact-page">
        <!-- Tarjeta con formulario de contacto -->
        <section class="contact-card">
            <!-- Botón para volver a la página principal -->
            <a href="../../../index.html" class="back-btn">← Volver al inicio</a>

            <!-- Título de la sección de contacto -->
            <h1>Contactanos</h1>
            <!-- Subtítulo descriptivo -->
            <p class="contact-subtitle">
                Escríbenos tu duda y te responderemos lo antes posible.
            </p>

            <!-- Formulario de contacto con validación -->
            <form id="contactForm">
                <!-- Campo para correo electrónico -->
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="ejemplo@correo.com" 
                        required
                    />
                </div>

                <!-- Campo para el título de la duda -->
                <div class="form-group">
                    <label for="titulo">Título de la duda</label>
                    <input 
                        type="text" 
                        id="titulo" 
                        name="titulo" 
                        placeholder="Escribe el título de tu duda" 
                        required
                    />
                </div>

                <!-- Campo textarea para la descripción de la duda -->
                <div class="form-group">
                    <label for="duda">Escribe tu duda</label>
                    <textarea 
                        id="duda" 
                        name="duda" 
                        placeholder="Explica aquí tu duda..."
                        required
                    ></textarea>
                </div>

                <!-- Botón para enviar el formulario -->
                <button type="submit" class="send-btn">Enviar</button>
            </form>
        </section>
    </main>

    <!-- Script para manejar la lógica de contacto -->
    <script src="../js/contacto.js"></script>
</body>
</html>
