<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GTI - Crear Cuenta</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&amp;display=swap" rel="stylesheet">

  <style type="text/css">
    :root {
      --primary-orange: #D97706;
      --secondary-orange: #F89119;
      --bg-main: #000000;
      --bg-card: #1B1B1B;
      --bg-input: #353535;
      --text-white: #FFFFFF;
      --text-gray: #A9B7C8;
      --accent-blue: #0B3D91;
      --error: #FF4D57;
      --font-main: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-main);
      color: var(--text-white);
      font-family: var(--font-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Estructura a dos columnas */
    .auth-container {
      display: flex;
      gap: 64px;
      max-width: 1000px;
      width: 90%;
      align-items: center;
      flex-wrap: wrap;
    }

    .auth-text { flex: 1; min-width: 300px; }
    .auth-text h1 { font-size: 48px; font-weight: 700; margin-bottom: 16px; line-height: 1.1; }
    .auth-text p { font-size: 16px; color: var(--text-gray); max-width: 400px; }

    .auth-card {
      flex: 1;
      min-width: 350px;
      background-color: var(--bg-card);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
    }

    .auth-card h2 {
      font-size: 30px;
      margin-bottom: 32px;
      color: var(--primary-orange);
      text-align: center;
    }

    .form-row { display: flex; gap: 16px; }
    .form-group { margin-bottom: 20px; width: 100%; }
    .form-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 600; }

    .form-group input {
      width: 100%;
      height: 44px;
      background-color: var(--bg-input);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0 16px;
      color: white;
      font: var(--font-main);
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent-blue);
      outline: none;
    }

    .btn-primary {
      width: 100%;
      height: 44px;
      background-color: var(--primary-orange);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn-primary:hover { background-color: var(--secondary-orange); }

    .error-msg {
      color: var(--error);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-text">
    <h1>Crea tu cuenta <br><span style="color: var(--primary-orange)">y comienza hoy</span></h1>
    <p>Regístrate para comprar, gestionar tus licencias y acceder a tus módulos educativos de pago único.</p>
  </div>

  <div class="auth-card">
    <h2>Crear cuenta</h2>
    <form id="registerForm">

      <div class="form-row">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label>Apellidos *</label>
          <input type="text" id="apellidos" placeholder="Tus apellidos" required>
        </div>
      </div>

      <div class="form-group">
        <label>Correo electrónico *</label>
        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" id="pass" placeholder="Ingresa tu contraseña" required>
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña *</label>
        <input type="password" id="passConfirm" placeholder="Repite tu contraseña" required>
        <div class="error-msg" id="passError">Las contraseñas no coinciden</div>
      </div>

      <button type="submit" class="btn-primary">REGISTRARSE</button>

      <p style="margin-top: 24px; text-align: center; font-size: 14px; color: var(--text-gray)">
        ¿Ya tienes una cuenta? <a href="login.html" style="color: var(--primary-orange); text-decoration: none; font-weight: 600;">Inicia sesión</a>
      </p>
    </form>
  </div>
</div>

<script type="text/javascript">
  const regForm = document.getElementById('registerForm');

  regForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const pass = document.getElementById('pass').value;
    const passConfirm = document.getElementById('passConfirm').value;
    const passError = document.getElementById('passError');

    if(pass !== passConfirm) {
      passError.style.display = 'block';
      document.getElementById('passConfirm').style.borderColor = 'var(--error)';
    } else {
      passError.style.display = 'none';
      document.getElementById('passConfirm').style.borderColor = 'transparent';
      alert("¡Registro exitoso! Bienvenido a GTI.");
    }
  });
</script>
</body>
</html>
