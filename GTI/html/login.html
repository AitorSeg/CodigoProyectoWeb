<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión - GTI</title>
  <link rel="stylesheet" href="../css/gti.css">
  <link rel="stylesheet" href="../css/login.css">
  
</head>
<body>

<div class="auth-card">
  <h2>Iniciar Sesión</h2>
  <p class="subtitle">Inicia sesión para comprar y gestionar tus módulos educativos</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required>
      <span class="error-text" id="error-email">Ingresa un correo válido.</span>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
      <span class="error-text" id="error-password">La contraseña es obligatoria.</span>
    </div>

    <div class="form-options">
      <label>
        <input type="checkbox" id="rememberMe">
        Recordarme
      </label>
      <a href="#">¿Has olvidado tu contraseña?</a>
    </div>

    <button type="submit" class="btn-primary">INICIA SESIÓN</button>
  </form>

  <div class="auth-footer">
    ¿No tienes cuenta? <a href="registro.html">Crea una aquí</a>
  </div>
</div>

<script src="../js/login.js"></script>
</body>
</body>
</html>
