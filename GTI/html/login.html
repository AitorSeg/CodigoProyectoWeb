<!DOCTYPE html>
<!-- Página de Login - Formulario para iniciar sesión de usuario -->
<html lang="es">
<head>
  <!-- Configuración de caracteres y título de la página -->
  <meta charset="UTF-8">
  <title>Iniciar Sesión - GTI</title>
  <!-- Estilos globales de GTI -->
  <link rel="stylesheet" href="../css/gti.css">
  <!-- Estilos específicos para la página de login -->
  <link rel="stylesheet" href="../css/login.css">
  
</head>
<body>

<!-- Tarjeta principal de autenticación/login -->
<div class="auth-card">
  <!-- Título de la tarjeta -->
  <h2>Iniciar Sesión</h2>
  <!-- Subtítulo descriptivo -->
  <p class="subtitle">Inicia sesión para comprar y gestionar tus módulos educativos</p>

  <!-- Formulario de autenticación -->
  <form id="loginForm">
    <!-- Campo de correo electrónico -->
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required>
      <!-- Mensaje de error para email inválido -->
      <span class="error-text" id="error-email">Ingresa un correo válido.</span>
    </div>

    <!-- Campo de contraseña -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
      <!-- Mensaje de error para contraseña faltante -->
      <span class="error-text" id="error-password">La contraseña es obligatoria.</span>
    </div>

    <!-- Opciones del formulario (recordar contraseña y enlace de recuperación) -->
    <div class="form-options">
      <!-- Checkbox para recordar sesión -->
      <label>
        <input type="checkbox" id="rememberMe">
        Recordarme
      </label>
      <!-- Enlace para recuperar contraseña -->
      <a href="#">¿Has olvidado tu contraseña?</a>
    </div>

    <!-- Botón para enviar el formulario -->
    <button type="submit" class="btn-primary">INICIA SESIÓN</button>
  </form>

  <!-- Pie de la tarjeta con enlace a registro -->
  <div class="auth-footer">
    ¿No tienes cuenta? <a href="registro.html">Crea una aquí</a>
  </div>
</div>

<!-- Script para manejar la lógica de login -->
<script src="../js/login.js"></script>
</body>
</html>
