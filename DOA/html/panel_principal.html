<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel principal | DOA</title>

    <link rel="stylesheet" href="../css/doa.css">
    <link rel="stylesheet" href="../css/doa-layout.css">
    <link rel="stylesheet" href="../css/panel_principal.css">
</head>

<body class="pagina-doa pagina-panel-principal">
    <header class="cabecera-panel-doa">
        <div class="cabecera-panel-doa__logo">
            <a href="panel_principal.html" aria-label="Ir al panel principal de DOA">
                <img
                    src="../img/LogoDoaAzulRecortado.png"
                    alt="Logo de DOA"
                    class="logo-doa"
                >
            </a>
        </div>

        <div class="cabecera-panel-doa__buscador">
            <div
                class="buscador-header buscador-header--desactivado"
                aria-label="Buscador visual pendiente de activar"
                title="El buscador se activará cuando se conecte la base de datos"
            >
                <span class="buscador-header__icono" aria-hidden="true">
                    <img src="../img/iconos/grey-search.svg" alt="">
                </span>

                <input
                    type="search"
                    placeholder="Buscar asignatura..."
                    disabled
                >
            </div>
        </div>

        <div class="cabecera-panel-doa__perfil">
            <div class="perfil-header">
                <span class="perfil-header__icono" aria-hidden="true">
                    <img src="../img/iconos/grey-user.svg" alt="">
                </span>

                <span class="perfil-header__texto">
                    <strong>Jorgito</strong>
                    <small>Alumno GTI</small>
                </span>
            </div>

            <a class="boton-cerrar-sesion-movil" href="elegir_perfil.html" aria-label="Cerrar sesión">
                <span class="boton-cerrar-sesion-movil__icono" aria-hidden="true">
                    <img class="icono-estado icono-estado--gris" src="../img/iconos/grey-log-out.svg" alt="">
                    <img class="icono-estado icono-estado--blanco" src="../img/iconos/white-log-out.svg" alt="">
                </span>
            </a>
        </div>
    </header>

    <div class="layout-doa">
        <div class="barra-lateral-doa">
            <div class="tarjeta-modo-prueba">
                <div class="tarjeta-modo-prueba__cabecera">
                    <span class="tarjeta-modo-prueba__icono" aria-hidden="true">
                        <img src="../img/iconos/grey-info.svg" alt="">
                    </span>

                    <strong>Modo de prueba</strong>
                </div>

                <p>
                    Estás usando DOA con datos de prueba. Las acciones no afectan a usuarios reales
                    y los permisos dependen del perfil elegido.
                </p>
            </div>

            <nav class="navegacion-lateral-doa" aria-label="Navegación principal de DOA">
                <a class="navegacion-lateral-doa__item navegacion-lateral-doa__item--activo" href="panel_principal.html">
                    <span class="navegacion-lateral-doa__icono" aria-hidden="true">
                        <img class="icono-estado icono-estado--gris" src="../img/iconos/grey-layout-dashboard.svg" alt="">
                        <img class="icono-estado icono-estado--blanco" src="../img/iconos/white-layout-dashboard.svg" alt="">
                        <img class="icono-estado icono-estado--azul" src="../img/iconos/blue-layout-dashboard.svg" alt="">
                    </span>

                    <span>Panel Principal</span>
                </a>

                <a class="navegacion-lateral-doa__item" href="#">
                    <span class="navegacion-lateral-doa__icono" aria-hidden="true">
                        <img class="icono-estado icono-estado--gris" src="../img/iconos/grey-notebook.svg" alt="">
                        <img class="icono-estado icono-estado--blanco" src="../img/iconos/white-notebook.svg" alt="">
                        <img class="icono-estado icono-estado--azul" src="../img/iconos/blue-notebook.svg" alt="">
                    </span>

                    <span>Mis Asignaturas</span>
                </a>

                <a class="navegacion-lateral-doa__item" href="#">
                    <span class="navegacion-lateral-doa__icono" aria-hidden="true">
                        <img class="icono-estado icono-estado--gris" src="../img/iconos/grey-bell.svg" alt="">
                        <img class="icono-estado icono-estado--blanco" src="../img/iconos/white-bell.svg" alt="">
                        <img class="icono-estado icono-estado--azul" src="../img/iconos/blue-bell.svg" alt="">
                    </span>

                    <span>Notificaciones</span>
                </a>
            </nav>

            <div class="barra-lateral-doa__salida">
                <a class="boton-cerrar-sesion" href="elegir_perfil.html">
                    <span class="boton-cerrar-sesion__icono" aria-hidden="true">
                        <img class="icono-estado icono-estado--gris" src="../img/iconos/grey-log-out.svg" alt="">
                        <img class="icono-estado icono-estado--blanco" src="../img/iconos/white-log-out.svg" alt="">
                        <img class="icono-estado icono-estado--azul" src="../img/iconos/blue-log-out.svg" alt="">
                    </span>

                    <span>Cerrar sesión</span>
                </a>
            </div>
        </div>

        <main class="contenido-panel-doa">
            <section class="bloque-panel-principal">
                <div class="cabecera-bloque-panel">
                    <h1>Mis asignaturas</h1>
                    <a href="#" class="cabecera-bloque-panel__enlace">VER TODAS LAS ASIGNATURAS</a>
                </div>

                <div class="resumen-asignaturas">
                    <button type="button" class="tarjeta-asignatura-resumen tarjeta-asignatura-resumen--activa">
                        <span class="tarjeta-asignatura-resumen__nombre">Matemáticas</span>
                        <span class="tarjeta-asignatura-resumen__punto" aria-hidden="true"></span>

                        <span class="tarjeta-asignatura-resumen__barra" aria-hidden="true">
                            <span style="width: 58%;"></span>
                        </span>
                    </button>

                    <button type="button" class="tarjeta-asignatura-resumen">
                        <span class="tarjeta-asignatura-resumen__nombre">Programación</span>
                        <span class="tarjeta-asignatura-resumen__punto" aria-hidden="true"></span>

                        <span class="tarjeta-asignatura-resumen__barra" aria-hidden="true">
                            <span style="width: 46%;"></span>
                        </span>
                    </button>

                    <button type="button" class="tarjeta-asignatura-resumen">
                        <span class="tarjeta-asignatura-resumen__nombre">Física</span>
                        <span class="tarjeta-asignatura-resumen__punto" aria-hidden="true"></span>

                        <span class="tarjeta-asignatura-resumen__barra" aria-hidden="true">
                            <span style="width: 42%;"></span>
                        </span>
                    </button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
